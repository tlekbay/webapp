<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#047857"/>
      <stop offset="100%" style="stop-color:#059669"/>
    </linearGradient>
  </defs>

  <!-- Clean rounded square -->
  <rect x="0" y="0" width="400" height="400" rx="88" fill="url(#bg)"/>

  <!-- Subtle inner glow top-left -->
  <ellipse cx="120" cy="100" rx="140" ry="90" fill="white" opacity="0.06"/>

  <!-- PC monogram — tight, centered, elegant -->
  <text
    x="200"
    y="272"
    text-anchor="middle"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="196"
    font-weight="700"
    fill="white"
    letter-spacing="-8"
  >PC</text>

  <!-- Single thin underline accent -->
  <rect x="120" y="298" width="160" height="2.5" rx="2" fill="#6ee7b7" opacity="0.7"/>

</svg>
